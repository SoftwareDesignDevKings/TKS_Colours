services:
  db:
    image: postgres:16-alpine
    container_name: tks_colours_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tks_colours
      POSTGRES_USER: tks_admin
      POSTGRES_PASSWORD: changeme_in_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tks_admin -d tks_colours"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tks_colours_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://tks_admin:changeme_in_production@db:5432/tks_colours
      APP_ENV: development
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://localhost"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: builder          # Dev: just the node build stage
    container_name: tks_colours_ui
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
